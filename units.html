<h3 class="section-title">Units</h3>

<div class="unit-desc">Pěchota, odstřelovači, speciální jednotky.</div>
</button>
<button class="unit-card unit-category" data-category="defenders">
<div class="unit-title">Obránce</div>
<div class="unit-desc">Stráž, štíty, protiútok.</div>
</button>
<button class="unit-card unit-category" data-category="weapons">
<div class="unit-title">Zbraně</div>
<div class="unit-desc">Pistole, samopaly, těžké zbraně.</div>
</button>
<button class="unit-card unit-category" data-category="vehicles">
<div class="unit-title">Auta</div>
<div class="unit-desc">Dodávky, SUV, obrněné vozy.</div>
</button>
</div>

<div class="units-cards unit-list">
